    <!-- --*--- Write a recursive function to generate Armstrong Number series up to n terms ---*--- -->


    <script>

        function isArmstrong(num, digits) {
            if (num === 0) {
                return 0;
            }

            let digit = num % 10;
            return Math.pow(digit, digits) + isArmstrong(Math.floor(num / 10), digits);
        }

        function generateArmstrong(current, count, n) {
            if (count === n) {
                return;
            }

            let digits = current.toString().length;

            if (isArmstrong(current, digits) === current) {
                console.log(current);
                generateArmstrong(current + 1, count + 1, n);
            } else {
                generateArmstrong(current + 1, count, n);
            }
        }

        generateArmstrong(0, 0, 15);


    </script>
