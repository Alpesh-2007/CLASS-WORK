<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!-- ---*--- Create a tax calculator with slab logic via functions ---*---- -->


    <script>

        const calculateTax = (income) => {

            if (income <= 250000) {
                return 0;
            }
            else if (income <= 500000) {
                return income * 0.05;
            }
            else if (income <= 1000000) {
                return income * 0.20;
            }
            else {
                return income * 0.30;
            }
        };

        let income = Number(prompt("Enter your income: "))
        // let income = 10000000;

        console.log("Income:", income);
        console.log("Tax:", calculateTax(income));
        console.log("Net Income:", income - calculateTax(income));


    </script>

</body>

</html>
